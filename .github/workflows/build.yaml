name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
env:
  IS_STABLE: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && !contains(github.ref_name, '+') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          # - platform: linux
          #   os: ubuntu-22.04
          #   arch: amd64
          # - platform: macos
          #   os: macos-15-intel
          #   arch: amd64
          - platform: macos
            os: macos-latest
            arch: arm64
          #          - platform: windows
          #            os: windows-11-arm
          #            arch: arm64
          # - platform: linux
          #   os: ubuntu-24.04-arm
          #   arch: arm64

    steps:
      - name: Setup rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        if: ${{ !(startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')) }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Setup Flutter With Other
        if: startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Setup Java
        if: startsWith(matrix.platform, 'android')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android
        if: startsWith(matrix.platform, 'android')
        uses: android-actions/setup-android@v3

      - name: Setup Android SDK
        if: startsWith(matrix.platform, 'android')
        shell: bash
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.0.13004108" \
            "cmake;3.22.1"
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Verify
        if: startsWith(matrix.platform, 'android')
        shell: bash
        run: |
          flutter analyze --no-pub
          flutter test --no-pub
          (cd core && CGO_ENABLED=0 go test -tags=with_gvisor ./...)

      - name: Setup Android Signing
        if: startsWith(matrix.platform, 'android')
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE" | base64 --decode > android/app/keystore.jks
          test -s android/app/keystore.jks
          keytool -list \
            -keystore android/app/keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" > /dev/null

      - name: Build
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Verify Android Signature
        if: startsWith(matrix.platform, 'android')
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          APK="$(find dist -type f -name '*-android-arm64-v8a.apk' -print -quit)"
          test -n "$APK"
          APPLICATION_ID="$("$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/apkanalyzer" \
            manifest application-id "$APK")"
          test "$APPLICATION_ID" = "com.follow.clash.dev"
          EXPECTED="$(keytool -list -v \
            -keystore android/app/keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]')"
          ACTUAL="$("$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" \
            verify --print-certs "$APK" | sed -n 's/^.*certificate SHA-256 digest: //p' | head -n 1 | tr -d '[:space:]')"
          test -n "$EXPECTED"
          test "$ACTUAL" = "$EXPECTED"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && !contains(github.ref_name, '+') }}
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag belongs to main
        id: main
        shell: bash
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo 'eligible=true' >> "$GITHUB_OUTPUT"
          else
            echo 'eligible=false' >> "$GITHUB_OUTPUT"
            echo 'Tag commit is not reachable from main; skipping release.'
          fi

      - name: Download
        if: steps.main.outputs.eligible == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Release
        if: steps.main.outputs.eligible == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/**/*
          fail_on_unmatched_files: true
#          body_path: './release.md'
